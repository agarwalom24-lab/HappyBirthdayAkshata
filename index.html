<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Akshata ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>

/* ---------- RESET ---------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#02040b;
font-family:'Poppins',sans-serif;
cursor:none;
}

/* ---------- BACKGROUND ---------- */

body{

background:

radial-gradient(circle at top,#132c52 0%,#07101c 45%,#010204 100%);

position:relative;

}

/* ---------- STARS ---------- */

#stars{

position:absolute;

width:100%;

height:100%;

overflow:hidden;

pointer-events:none;

}

.star{

position:absolute;

background:white;

border-radius:50%;

opacity:.7;

animation:twinkle linear infinite;

}

@keyframes twinkle{

0%{

opacity:.15;

transform:scale(.8);

}

50%{

opacity:1;

transform:scale(1.6);

}

100%{

opacity:.15;

transform:scale(.8);

}

}

/* ---------- MOON ---------- */

#moon{

position:absolute;

right:7%;

top:8%;

width:180px;

height:180px;

border-radius:50%;

background:

radial-gradient(circle,#fff,#f6f0de,#d6ccb8);

box-shadow:

0 0 90px rgba(255,255,255,.45),

0 0 180px rgba(255,255,255,.18);

animation:moonFloat 10s ease-in-out infinite;

}

@keyframes moonFloat{

50%{

transform:translateY(-10px);

}

}

/* ---------- CURSOR ---------- */

#cursorGlow{

position:fixed;

width:180px;

height:180px;

border-radius:50%;

background:

radial-gradient(circle,

rgba(255,210,250,.35),

transparent 70%);

filter:blur(20px);

pointer-events:none;

mix-blend-mode:screen;

z-index:99999;

transform:translate(-50%,-50%);

}

/* ---------- LANDING ---------- */

#landing{

position:absolute;

width:100%;

height:100%;

display:flex;

justify-content:center;

align-items:center;

z-index:100;

}

.centerContent{

text-align:center;

}

#birthdayText{

font-family:'Cormorant Garamond',serif;

font-size:80px;

font-weight:300;

color:white;

letter-spacing:2px;

}

.akshata{

font-family:'Great Vibes',cursive;

font-size:120px;

display:block;

margin-top:15px;

color:#ffe2ef;

text-shadow:

0 0 25px rgba(255,180,220,.8),

0 0 80px rgba(255,180,220,.4);

}

.subtitle{

margin-top:20px;

color:#d7dce8;

font-size:18px;

letter-spacing:2px;

font-weight:300;

}

#beginButton{

margin-top:40px;

padding:18px 45px;

border-radius:60px;

border:1px solid rgba(255,255,255,.18);

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

color:white;

font-size:16px;

transition:.4s;

cursor:pointer;

}

#beginButton:hover{

transform:translateY(-5px);

box-shadow:0 0 30px rgba(255,255,255,.25);

background:rgba(255,255,255,.18);

}

/* ---------- LOADER ---------- */

#loader{

position:fixed;

width:100%;

height:100%;

background:#02040b;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999999;

transition:1.5s;

}

.loader-circle{

width:90px;

height:90px;

border-radius:50%;

border:3px solid rgba(255,255,255,.15);

border-top-color:white;

animation:spin 1s linear infinite;

}

.loader-text{

margin-top:30px;

color:white;

letter-spacing:4px;

font-family:'Cormorant Garamond',serif;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

</style>

</head>

<body>

<div id="loader">

    <div class="loader-circle"></div>

    <div class="loader-text">
        Preparing Something Magical...
    </div>

</div>

<div id="background">

    <div id="moon"></div>

    <div id="stars"></div>

    <div id="particles"></div>

    <div id="fireflies"></div>

    <div id="petals"></div>

</div>

<div id="cursorGlow"></div>

<section id="landing">

<div class="centerContent">

<h1 id="birthdayText">

Happy Birthday

<br>

<span class="akshata">
Akshata
</span>

</h1>

<p class="subtitle">

For someone who deserves something magical.

</p>

<button id="beginButton">

Begin ✨

</button>

</div>

</section>

<section id="garden">

<div id="magicTrail"></div>

<div id="bouquet"></div>

</section>

<section id="letterScene">

<div id="envelope">

<div class="flap"></div>

<div class="paper">

<h2>

Happy Birthday ❤️

</h2>

<div id="note">

<!-- We'll add the note later -->

</div>

</div>

</div>

</section>

<script>

const stars=document.getElementById("stars");

for(let i=0;i<500;i++){

const s=document.createElement("div");

s.className="star";

const size=Math.random()*3+1;

s.style.width=size+"px";

s.style.height=size+"px";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDuration=(2+Math.random()*4)+"s";

stars.appendChild(s);

}

const glow=document.getElementById("cursorGlow");

document.addEventListener("mousemove",(e)=>{

glow.style.left=e.clientX+"px";

glow.style.top=e.clientY+"px";

});

window.onload=()=>{

setTimeout(()=>{

document.getElementById("loader").style.opacity="0";

setTimeout(()=>{

document.getElementById("loader").style.display="none";

},1500);

},2000);

};

gsap.from("#birthdayText",{

opacity:0,

y:80,

duration:2,

ease:"power4.out"

});

gsap.from(".subtitle",{

opacity:0,

delay:1,

duration:2

});

gsap.from("#beginButton",{

opacity:0,

delay:1.6,

y:40,

duration:1.5

});

</script>

</body>

</html>
