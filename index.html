<script>
gsap.registerPlugin(MotionPathPlugin);

// ─── CURSOR ──────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const cursorGlow = document.getElementById('cursor-glow');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let gx = mx, gy = my;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  gsap.to(cursor, { x: mx, y: my, duration: 0.08, ease: 'none' });
  gsap.to(cursorGlow, { x: mx, y: my, duration: 0.25, ease: 'power2.out' });
});

// ─── STARS ───────────────────────────────────────────────
const starCanvas = document.getElementById('star-canvas');
const sCtx = starCanvas.getContext('2d');
function resizeStarCanvas() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
resizeStarCanvas();
window.addEventListener('resize', resizeStarCanvas);

const stars = [];
for (let i = 0; i < 220; i++) {
  stars.push({
    x: Math.random(), y: Math.random() * 0.7,
    r: Math.random() * 1.4 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.008 + 0.003,
    phase: Math.random() * Math.PI * 2
  });
}

function drawStars(time) {
  const W = starCanvas.width, H = starCanvas.height;
  sCtx.clearRect(0, 0, W, H);
  stars.forEach(s => {
    const tw = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
    const alpha = s.a * (0.4 + 0.6 * tw);
    sCtx.beginPath();
    sCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255,245,230,${alpha})`;
    sCtx.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ─── PARTICLE SYSTEM ─────────────────────────────────────
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
function resizePCanvas() { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
resizePCanvas();
window.addEventListener('resize', resizePCanvas);

const particles = [];
function spawnParticle(x, y, type) {
  const hue = type === 'dust' ? 45 : type === 'spark' ? 50 : 320;
  const sat = type === 'petal' ? '60%' : '70%';
  particles.push({
    x, y,
    vx: (Math.random()-0.5) * (type==='spark'?3:1.5),
    vy: -Math.random() * (type==='spark'?2.5:1.5) - 0.5,
    life: 1,
    decay: Math.random() * 0.015 + (type==='spark'?0.02:0.008),
    r: Math.random() * (type==='spark'?3:4) + 1,
    color: `hsl(${hue},${sat},80%)`
  });
}

function updateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.02; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    const grd = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2);
    grd.addColorStop(0, p.color.replace(')', `,${p.life})`).replace('hsl', 'hsla'));
    grd.addColorStop(1, p.color.replace(')', ',0)').replace('hsl', 'hsla'));
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r * 2, 0, Math.PI * 2);
    pCtx.fillStyle = grd;
    pCtx.fill();
  }
  requestAnimationFrame(updateParticles);
}
requestAnimationFrame(updateParticles);

// ─── FIREFLIES ────────────────────────────────────────────
function createFirefly() {
  const ff = document.createElement('div');
  ff.className = 'firefly';
  const sz = Math.random() * 4 + 2;
  const hue = Math.random() > 0.5 ? 50 : 200;
  ff.style.cssText = `width:${sz}px;height:${sz}px;
    background:radial-gradient(circle,hsl(${hue},80%,90%),transparent);
    box-shadow:0 0 ${sz*3}px hsl(${hue},80%,70%);
    left:${Math.random()*100}%;top:${20+Math.random()*60}%;`;
  document.getElementById('stage').appendChild(ff);

  const tl = gsap.timeline({ repeat: -1 });
  tl.to(ff, {
    x: (Math.random()-0.5)*200, y: (Math.random()-0.5)*150,
    opacity: 0.8, duration: 3+Math.random()*4, ease: 'sine.inOut'
  }).to(ff, {
    x: (Math.random()-0.5)*200, y: (Math.random()-0.5)*150,
    opacity: 0.2, duration: 3+Math.random()*4, ease: 'sine.inOut'
  });
}
for(let i=0;i<14;i++) setTimeout(createFirefly, i*300);

// ─── SPARKLE DOM ─────────────────────────────────────────
function createSparkle(x, y) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = x + 'px'; s.style.top = y + 'px';
  const sz = 8 + Math.random()*12;
  s.innerHTML = `<svg width="${sz}" height="${sz}" viewBox="0 0 20 20">
    <path d="M10,0 L11.5,8.5 L20,10 L11.5,11.5 L10,20 L8.5,11.5 L0,10 L8.5,8.5 Z"
      fill="hsl(${40+Math.random()*20},80%,75%)" opacity="${0.7+Math.random()*0.3}"/>
  </svg>`;
  document.getElementById('stage').appendChild(s);
  setTimeout(() => s.remove(), 900);
}

// ─── FAIRY PATH ───────────────────────────────────────────
const fairyContainer = document.getElementById('fairy-container');
let fairyPathIndex = 0;
const fairyPaths = [
  { x:[0.15,0.3,0.5,0.7,0.85], y:[0.6,0.3,0.5,0.25,0.55] },
  { x:[0.85,0.7,0.5,0.3,0.15], y:[0.55,0.4,0.6,0.35,0.65] },
  { x:[0.15,0.4,0.6,0.8,0.5],  y:[0.65,0.2,0.45,0.7,0.35] },
];

function animateFairy() {
  const path = fairyPaths[fairyPathIndex % fairyPaths.length];
  fairyPathIndex++;
  const W = window.innerWidth, H = window.innerHeight;

  const keyframes = path.x.map((px, i) => ({
    x: px * W, y: path.y[i] * H, ease: 'power2.inOut'
  }));

  let t = 0;
  keyframes.forEach((kf, i) => {
    if (i === 0) return;
    const prev = i > 0 ? keyframes[i-1] : { x: parseFloat(fairyContainer.style.left)||W/2, y: parseFloat(fairyContainer.style.top)||H/2 };
    t += 2.2;
    gsap.to(fairyContainer, {
      left: kf.x, top: kf.y, duration: 2.2, ease: 'power2.inOut', delay: t - 2.2,
      onUpdate: function() {
        const fx = parseFloat(fairyContainer.style.left);
        const fy = parseFloat(fairyContainer.style.top);
        if (Math.random() < 0.25) {
          spawnParticle(fx, fy, 'dust');
          if (Math.random() < 0.3) createSparkle(fx, fy);
        }
      }
    });
  });
  setTimeout(animateFairy, t * 1000 + 400);
}

// ─── PETALS FALLING ───────────────────────────────────────
function spawnFallingPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  const colors = ['#e8a0b8','#f0c0d0','#d88898','#f8d0e0','#c87890'];
  const color = colors[Math.floor(Math.random()*colors.length)];
  const sz = 8 + Math.random()*10;
  el.innerHTML = `<svg width="${sz}" height="${sz*1.4}" viewBox="0 0 10 14">
    <ellipse cx="5" cy="7" rx="4.5" ry="6.5" fill="${color}" opacity="0.75" transform="rotate(${Math.random()*30-15},5,7)"/>
  </svg>`;
  el.style.left = Math.random()*100 + 'vw';
  el.style.top = '-30px';
  document.getElementById('stage').appendChild(el);
  gsap.to(el, {
    y: window.innerHeight + 60,
    x: (Math.random()-0.5)*200,
    rotation: (Math.random()-0.5)*540,
    opacity: 0,
    duration: 6 + Math.random()*6,
    ease: 'none',
    onComplete: () => el.remove()
  });
  gsap.fromTo(el, { opacity: 0 }, { opacity: 0.7, duration: 1 });
}

// ─── PARALLAX ─────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  const px = (e.clientX / window.innerWidth - 0.5) * 20;
  const py = (e.clientY / window.innerHeight - 0.5) * 12;
  gsap.to('#moon', { x: -px * 0.5, y: -py * 0.5, duration: 1.5, ease: 'power2.out' });
  gsap.to('#bouquet-wrap', { x: -px * 0.3, y: -py * 0.2, duration: 1.8, ease: 'power2.out' });
  gsap.to('.amb-blob', { x: -px * 0.8, y: -py * 0.5, duration: 2, ease: 'power2.out', stagger: 0.1 });
});

// ─── BREATHING ANIMATIONS ─────────────────────────────────
function breathe(el, scale1, scale2, dur) {
  gsap.to(el, { scale: scale2, duration: dur, ease: 'sine.inOut', yoyo: true, repeat: -1, transformOrigin: 'center center', overwrite: false });
}

// ─── MAIN TIMELINE ────────────────────────────────────────
const master = gsap.timeline({ delay: 0.3 });

// 1. Fade in from black
master.to('#fade-overlay', { opacity: 0, duration: 2.5, ease: 'power2.inOut' });

// 2. Stars fade in
master.to('#star-canvas', { opacity: 1, duration: 3, ease: 'power2.inOut' }, '-=1.5');

// 3. Ambient blobs
master.to('.amb-blob', { opacity: 1, duration: 4, stagger: 0.6, ease: 'power2.inOut' }, '-=2');

// 4. Moon fades in with bloom
master.to('#moon', { opacity: 1, duration: 3, ease: 'power2.inOut' }, '-=2');
master.call(() => { breathe('#moon svg', 1, 1.04, 4); });

// 5. Firefly enter
master.to({}, { duration: 1 });

// 6. Fairy appears
master.to('#fairy-container', { opacity: 1, duration: 1.5, ease: 'power2.inOut' });
master.call(() => {
  const W = window.innerWidth, H = window.innerHeight;
  gsap.set('#fairy-container', { left: W * 0.15, top: H * 0.6 });
  animateFairy();
});

// 7. Ground glow rises
master.to('#ground-glow', { opacity: 1, duration: 3, ease: 'power2.inOut' }, '-=0.5');

// 8. Bouquet appears - stems grow
master.to('#bouquet-wrap', { opacity: 1, duration: 0.5 }, '+=1.5');
master.to('#g-stems', { opacity: 1, duration: 0.3 });
// Stems draw up (simulate with scaleY from bottom)
master.fromTo('#g-stems', { scaleY: 0 }, { scaleY: 1, duration: 2.5, ease: 'power2.out', transformOrigin: 'center bottom' });

// 9. Leaves unfold
master.fromTo('#g-leaves', { opacity: 0, scale: 0 },
  { opacity: 1, scale: 1, duration: 1.8, ease: 'back.out(1.4)', transformOrigin: 'center bottom' }, '-=1');

// 10. Flowers bloom one by one
const flowers = ['#fl1','#fl2','#fl3','#fl4','#fl5','#fl6','#fl7','#fl8','#fl9','#fl10','#fl11'];
flowers.forEach((id, i) => {
  master.fromTo(id, { scale: 0, opacity: 0 },
    { scale: 1, opacity: 1, duration: 1.2, ease: 'back.out(1.6)', transformOrigin: '0px 0px' },
    i === 0 ? '-=0.8' : '-=0.7');
  master.call(() => {
    const el = document.querySelector(id);
    if (el) breathe(id, 0.97, 1.03, 2 + Math.random());
  });
});

// 11. Ribbon ties
master.to('#g-ribbon', { opacity: 1, duration: 0.3 }, '+=0.5');
master.fromTo('#g-ribbon', { scaleX: 0 }, {
  scaleX: 1, duration: 1.8, ease: 'elastic.out(0.8,0.5)', transformOrigin: '210px 454px'
});

// 12. Start petals falling
master.call(() => {
  setInterval(() => { if (Math.random() < 0.5) spawnFallingPetal(); }, 800);
});

// 13. Bouquet floats up slightly, text stage comes in
master.to('#bouquet-wrap', { y: -30, duration: 2, ease: 'power2.inOut' }, '+=0.8');
master.to('#text-stage', { pointerEvents: 'none' });

// 14. Pen appears
master.to('#pen-svg-wrap', { opacity: 1, duration: 0.8 });
master.set('#pen-svg-wrap', { top: '26%', left: '50%', xPercent: -50 });

// 15. "Happy Birthday" writes itself
master.to('#hb-svg', { opacity: 1, duration: 0.5 }, '-=0.3');
master.fromTo('#hb-svg text',
  { strokeDashoffset: 2000, strokeDasharray: 2000, opacity: 0, fill: 'rgba(240,208,128,0)', stroke: 'rgba(201,168,76,0.9)', strokeWidth: 0.5 },
  { strokeDashoffset: 0, opacity: 1, fill: 'url(#textGrad)', duration: 4, ease: 'power2.inOut' }
);

// Sparkles during write
master.call(() => {
  let count = 0;
  const interval = setInterval(() => {
    const hbRect = document.getElementById('hb-svg').getBoundingClientRect();
    createSparkle(
      hbRect.left + Math.random() * hbRect.width,
      hbRect.top + Math.random() * hbRect.height
    );
    if (++count > 30) clearInterval(interval);
  }, 120);
}, [], '-=3.5');

// Move pen to name position
master.to('#pen-svg-wrap', { top: '38%', duration: 0.8, ease: 'power2.inOut' }, '-=0.5');

// 16. "Akshata" writes
master.to('#name-svg', { opacity: 1, duration: 0.3 });
master.fromTo('#name-svg text',
  { strokeDashoffset: 2000, strokeDasharray: 2000, opacity: 0, fill: 'rgba(240,208,128,0)', stroke: 'rgba(201,168,76,0.9)', strokeWidth: 0.5 },
  { strokeDashoffset: 0, opacity: 1, fill: 'url(#textGrad)', duration: 3.2, ease: 'power2.inOut' }
);
master.call(() => {
  let count = 0;
  const interval = setInterval(() => {
    const nRect = document.getElementById('name-svg').getBoundingClientRect();
    createSparkle(nRect.left + Math.random()*nRect.width, nRect.top + Math.random()*nRect.height);
    if(++count > 25) clearInterval(interval);
  }, 130);
  breathe('#hb-svg', 0.98, 1.02, 3);
  breathe('#name-svg', 0.99, 1.01, 2.5);
}, [], '-=2.5');

// Pen fades away
master.to('#pen-svg-wrap', { opacity: 0, duration: 0.8 }, '-=0.5');

// 17. Wait, then bring in envelope
master.to({}, { duration: 2.5 });

// Bouquet slides down (off screen partially)
master.to('#bouquet-wrap', { y: 200, opacity: 0.4, duration: 2, ease: 'power2.inOut' });
master.to('#text-stage', { opacity: 0, y: -40, duration: 1.5, ease: 'power2.inOut' }, '-=1.5');

// Envelope floats in
master.to('#envelope-section', { opacity: 1, pointerEvents: 'auto', duration: 1.5, ease: 'power2.out' }, '-=0.5');
master.fromTo('#envelope-wrap', { y: 80, scale: 0.8 }, { y: 0, scale: 1, duration: 1.8, ease: 'back.out(1.2)' }, '-=1');
master.to('#envelope-wrap', { y: -8, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: -1 });

// ─── ENVELOPE CLICK ───────────────────────────────────────
const NOTE = `My dearest Akshata,

On this beautiful day, the stars paused
their dance just to celebrate you.

You bring magic to every room you enter —
the kind of quiet, luminous magic
that makes the world softer and brighter
just by existing in it.

May this year hold every dream
you've dared to whisper,
every adventure you've longed for,
and every joy you deserve
— which is boundless.

With all the warmth in the universe,
Happy Birthday. 🌸`;

let envelopeOpened = false;
document.getElementById('envelope-wrap').addEventListener('click', openEnvelope);

function openEnvelope() {
  if (envelopeOpened) return;
  envelopeOpened = true;
  document.getElementById('click-hint').style.display = 'none';
  document.getElementById('envelope-wrap').style.cursor = 'default';

  // Wax seal breaks
  const sealTl = gsap.timeline();
  sealTl.to('#wax-seal', { scale: 1.15, duration: 0.1, ease: 'power4.out' })
         .to('#wax-seal', { scale: 0, opacity: 0, rotation: 20, duration: 0.4, ease: 'back.in(2)' });

  // Spawn sparks
  const sealEl = document.getElementById('wax-seal');
  const sealRect = document.getElementById('env-svg').getBoundingClientRect();
  for (let i = 0; i < 20; i++) {
    setTimeout(() => spawnParticle(sealRect.left + 190, sealRect.top + 165, 'spark'), i * 30);
  }

  // Flap opens
  gsap.to('#env-flap', {
    scaleY: -1, transformOrigin: '190px 80px',
    duration: 1.2, ease: 'power2.inOut', delay: 0.3
  });

  // Letter rises and unfolds
  const letterWrap = document.getElementById('letter-wrap');
  letterWrap.style.pointerEvents = 'auto';
  gsap.to(letterWrap, { opacity: 1, duration: 0.4, delay: 0.8 });
  gsap.to(letterWrap, { scaleY: 1, y: -280, duration: 1.4, ease: 'power2.out', delay: 0.8 });

  // Typewriter effect
  const letterEl = document.getElementById('letter-inner');
  let idx = 0;
  function type() {
    if (idx < NOTE.length) {
      letterEl.textContent = NOTE.slice(0, ++idx);
      setTimeout(type, idx === 1 ? 900 : 18 + Math.random()*20);
    } else {
      document.getElementById('letter-cursor').style.animation = 'none';
      document.getElementById('letter-cursor').style.opacity = '0';
    }
  }
  setTimeout(type, 1800);

  // Sparkles rain on letter after
  setTimeout(() => {
    let sc = 0;
    const iv = setInterval(() => {
      const r = letterWrap.getBoundingClientRect();
      createSparkle(r.left + Math.random()*r.width, r.top + Math.random()*r.height);
      if(++sc > 25) clearInterval(iv);
    }, 200);
  }, 2000);
}
