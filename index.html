<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday, Akshata</title>
<meta name="description" content="A little something for Akshata's birthday.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink: #0a0d18;
    --ink-deep: #05060c;
    --panel: #12162a;
    --parchment: #f6eee0;
    --parchment-dim: #ece1cd;
    --gold: #c9a24b;
    --gold-soft: #e6cd8f;
    --ember: #a85a3f;
    --ember-dark: #7c3f2b;
    --text-soft: #cfc9bd;
    --text-faint: #8b8879;
    --serif-display: "Fraunces", serif;
    --serif-note: "Cormorant Garamond", serif;
    --sans: "Inter", sans-serif;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--ink);
    color: var(--text-soft);
    font-family: var(--sans);
    overflow-x: hidden;
  }

  body{
    min-height: 100vh;
    min-height: 100svh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 5vw;
    text-align: center;
  }

  /* ---------- Ambient starfield ---------- */
  #stars{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .star{
    position: absolute;
    background: var(--gold-soft);
    border-radius: 50%;
    opacity: 0.35;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle{
    0%, 100%{ opacity: 0.15; }
    50%{ opacity: 0.75; }
  }

  #glow{
    position: fixed;
    top: 50%;
    left: 50%;
    width: 900px;
    height: 900px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(201,162,75,0.10) 0%, rgba(201,162,75,0.03) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ---------- Stage (seal view) ---------- */
  .stage{
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    text-align: center;
    transition: opacity 0.7s ease, filter 0.7s ease, transform 0.7s ease;
  }

  .stage.hidden{
    opacity: 0;
    filter: blur(6px);
    transform: scale(0.96);
    pointer-events: none;
    position: absolute;
  }

  .eyebrow{
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 500;
  }

  .eyebrow span{
    color: var(--gold-soft);
  }

  /* Seal row: sprig — seal — sprig */
  .seal-row{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(6px, 3vw, 26px);
  }

  .sprig{
    width: clamp(34px, 8vw, 56px);
    height: auto;
    flex-shrink: 0;
    opacity: 0.85;
  }
  .sprig.right{ transform: scaleX(-1); }

  .sprig path, .sprig ellipse, .sprig circle{
    fill: none;
    stroke: var(--gold-soft);
    stroke-width: 1.3;
    stroke-linecap: round;
  }
  .sprig .petal{
    fill: rgba(230,205,143,0.12);
  }
  .sprig .leaf{
    stroke: var(--gold);
    opacity: 0.75;
  }

  /* Wax seal */
  .seal-wrap{
    position: relative;
    width: 168px;
    height: 168px;
    margin: 0 auto;
  }

  .seal-btn{
    appearance: none;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    width: 168px;
    height: 168px;
    border-radius: 50%;
    display: block;
    position: relative;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
  }

  .seal-btn:hover{ transform: translateY(-3px); }
  .seal-btn:active{ transform: translateY(1px) scale(0.97); }

  .seal-btn:focus-visible{
    outline: 2px solid var(--gold-soft);
    outline-offset: 6px;
  }

  .seal-btn svg{
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 12px 28px rgba(0,0,0,0.55));
  }

  .seal-crack{
    stroke: var(--ink-deep);
    stroke-width: 1.4;
    fill: none;
    stroke-linecap: round;
    opacity: 0;
  }

  .seal-btn.cracking .seal-crack{
    animation: crackIn 0.5s ease forwards;
  }
  .seal-btn.cracking .seal-crack.c2{ animation-delay: 0.08s; }
  .seal-btn.cracking .seal-crack.c3{ animation-delay: 0.15s; }

  @keyframes crackIn{
    from{ opacity: 0; stroke-dasharray: 40; stroke-dashoffset: 40; }
    to{ opacity: 0.9; stroke-dasharray: 40; stroke-dashoffset: 0; }
  }

  .seal-btn.breaking{
    animation: sealBreak 0.65s cubic-bezier(.5,0,.75,0) forwards;
  }

  @keyframes sealBreak{
    0%{ transform: scale(1) rotate(0deg); opacity: 1; }
    40%{ transform: scale(1.08) rotate(-3deg); }
    100%{ transform: scale(1.35) rotate(6deg); opacity: 0; filter: blur(3px); }
  }

  .prompt-text{
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
