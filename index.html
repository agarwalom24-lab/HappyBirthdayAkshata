<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Akshata 🌸</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:linear-gradient(to top,#08141f,#12273d,#21496b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
}

.stars{
    position:absolute;
    width:100%;
    height:100%;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    50%{opacity:.2;}
}

.scene{
    position:relative;
    width:500px;
    height:600px;
}

.flower{
    position:absolute;
    bottom:100px;
    transform:scale(0);
    animation:bloom 1.2s forwards;
}

@keyframes bloom{
    to{
        transform:scale(1);
    }
}

.stem{
    position:absolute;
    width:6px;
    height:180px;
    background:#2d8a42;
    left:47px;
    top:80px;
    border-radius:5px;
}

.center{
    position:absolute;
    width:30px;
    height:30px;
    background:#ffd54f;
    border-radius:50%;
    left:35px;
    top:45px;
    z-index:2;
}

.petal{
    position:absolute;
    width:40px;
    height:60px;
    background:pink;
    border-radius:50%;
    transform-origin:bottom center;
    animation:sway 3s ease-in-out infinite;
}

@keyframes sway{
    50%{
        transform:rotate(var(--r)) translateY(-2px);
    }
}

.p1{left:30px;top:0;--r:5deg;}
.p2{left:55px;top:20px;transform:rotate(60deg);}
.p3{left:45px;top:50px;transform:rotate(120deg);}
.p4{left:15px;top:50px;transform:rotate(180deg);}
.p5{left:0px;top:20px;transform:rotate(240deg);}
.p6{left:20px;top:-5px;transform:rotate(300deg);}

.leaf{
    position:absolute;
    width:40px;
    height:20px;
    background:#3ca94f;
    border-radius:100% 0;
}

.l1{
    top:150px;
    left:15px;
    transform:rotate(-40deg);
}

.l2{
    top:120px;
    left:55px;
    transform:rotate(140deg);
}

.message{
    position:absolute;
    width:100%;
    bottom:10px;
    text-align:center;
    color:white;
    font-size:42px;
    font-weight:bold;
    opacity:0;
    animation:show 2s forwards;
    animation-delay:4s;
    text-shadow:0 0 20px #ffb6d5;
}

@keyframes show{
    to{
        opacity:1;
    }
}
</style>

</head>
<body>

<div class="stars"></div>

<div class="scene">

<div class="flower" style="left:70px; animation-delay:0s;">
<div class="stem"></div>
<div class="leaf l1"></div>
<div class="leaf l2"></div>
<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>
<div class="petal p5"></div>
<div class="petal p6"></div>
<div class="center"></div>
</div>

<div class="flower" style="left:190px; animation-delay:.8s;">
<div class="stem"></div>
<div class="leaf l1"></div>
<div class="leaf l2"></div>
<div class="petal p1" style="background:#ff8fab;"></div>
<div class="petal p2" style="background:#ff8fab;"></div>
<div class="petal p3" style="background:#ff8fab;"></div>
<div class="petal p4" style="background:#ff8fab;"></div>
<div class="petal p5" style="background:#ff8fab;"></div>
<div class="petal p6" style="background:#ff8fab;"></div>
<div class="center"></div>
</div>

<div class="flower" style="left:310px; animation-delay:1.6s;">
<div class="stem"></div>
<div class="leaf l1"></div>
<div class="leaf l2"></div>
<div class="petal p1" style="background:#ffd6a5;"></div>
<div class="petal p2" style="background:#ffd6a5;"></div>
<div class="petal p3" style="background:#ffd6a5;"></div>
<div class="petal p4" style="background:#ffd6a5;"></div>
<div class="petal p5" style="background:#ffd6a5;"></div>
<div class="petal p6" style="background:#ffd6a5;"></div>
<div class="center"></div>
</div>

<div class="message">
🌸 Happy Birthday Akshata 🌸
</div>

</div>

<script>
// Generate stars
const stars=document.querySelector(".stars");

for(let i=0;i<120;i++){
    const s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDelay=Math.random()*3+"s";
    stars.appendChild(s);
}
</script>

</body>
</html>
